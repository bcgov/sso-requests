name: Build Images and Deploy CSS - Test

on:
  workflow_dispatch:
  push:
    branches:
      - SSOTEAM-2670-02
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'db/**'
      - 'helm/templates/**'
      - 'helm/values**'
      - 'api/**'
      - 'cron/**'
      - '.github/workflows/publish-image.yaml'

env:
  GITHUB_REGISTRY: ghcr.io
  IMAGE_NAME: bcgov/sso-requests

jobs:
  build-and-push-images-and-deploy:
    permissions: write-all
    runs-on: ubuntu-24.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: actions/checkout@v6

      - name: Setup Common Environment Variables
        run: |
          cat >> $GITHUB_ENV <<EOF
          NEXT_PUBLIC_SSO_CLIENT_ID="css-app-in-gold-4128"
          NEXT_PUBLIC_SSO_AUTHORIZATION_RESPONSE_TYPE="code"
          NEXT_PUBLIC_SSO_AUTHORIZATION_SCOPE="openid"
          NEXT_PUBLIC_SSO_TOKEN_GRANT_TYPE="authorization_code"
          NEXT_PUBLIC_ENABLE_GOLD="true"
          NEXT_PUBLIC_INCLUDE_DIGITAL_CREDENTIAL="true"
          NEXT_PUBLIC_INCLUDE_BC_SERVICES_CARD="true"
          NEXT_PUBLIC_ALLOW_BC_SERVICES_CARD_PROD="true"
          NEXT_PUBLIC_INCLUDE_OTP="true"
          EOF

      - name: Setup Sandbox Environment Variables
        run: |
          cat >> $GITHUB_ENV <<EOF
          NEXT_PUBLIC_APP_ENV="development"
          NEXT_PUBLIC_API_URL="https://sso-requests-sandbox.apps.gold.devops.gov.bc.ca/api"
          NEXT_PUBLIC_SSO_URL="https://dev.loginproxy.gov.bc.ca/auth"
          NEXT_PUBLIC_SSO_REDIRECT_URI="https://sso-requests-sandbox.apps.gold.devops.gov.bc.ca"
          NEXT_PUBLIC_SSO_CONFIGURATION_ENDPOINT="https://dev.loginproxy.gov.bc.ca/auth/realms/standard/.well-known/openid-configuration"
          NEXT_PUBLIC_APP_URL="https://sso-requests-sandbox.apps.gold.devops.gov.bc.ca"

          API_AUTH_SECRET=${{ secrets.API_AUTH_SECRET }}
          GRAFANA_API_TOKEN=${{ secrets.DEV_GRAFANA_API_TOKEN }}
          KEYCLOAK_V2_DEV_URL=https://dev.sandbox.loginproxy.gov.bc.ca
          KEYCLOAK_V2_TEST_URL=https://test.sandbox.loginproxy.gov.bc.ca
          KEYCLOAK_V2_PROD_URL=https://sandbox.loginproxy.gov.bc.ca
          KEYCLOAK_V2_DEV_USERNAME=${{ secrets.DEV_KEYCLOAK_V2_DEV_USERNAME }}
          KEYCLOAK_V2_DEV_PASSWORD=${{ secrets.DEV_KEYCLOAK_V2_DEV_PASSWORD }}
          KEYCLOAK_V2_TEST_USERNAME=${{ secrets.DEV_KEYCLOAK_V2_TEST_USERNAME }}
          KEYCLOAK_V2_TEST_PASSWORD=${{ secrets.DEV_KEYCLOAK_V2_TEST_PASSWORD }}
          KEYCLOAK_V2_PROD_USERNAME=${{ secrets.DEV_KEYCLOAK_V2_PROD_USERNAME }}
          KEYCLOAK_V2_PROD_PASSWORD=${{ secrets.DEV_KEYCLOAK_V2_PROD_PASSWORD }}
          CHES_USERNAME=${{secrets.CHES_USERNAME_PROD}}
          CHES_PASSWORD=${{secrets.CHES_PASSWORD_PROD}}
          VERIFY_USER_SECRET=${{secrets.VERIFY_USER_SECRET}}
          BCSC_INITIAL_ACCESS_TOKEN_DEV=${{secrets.BCSC_INITIAL_ACCESS_TOKEN_SIT}}
          BCSC_INITIAL_ACCESS_TOKEN_TEST=${{secrets.BCSC_INITIAL_ACCESS_TOKEN_SIT}}
          BCSC_INITIAL_ACCESS_TOKEN_PROD=${{secrets.BCSC_INITIAL_ACCESS_TOKEN_SIT}}
          REDIS_HOST=${{secrets.DEV_REDIS_HOST}}
          GRAFANA_API_URL=https://sso-grafana-sandbox.apps.gold.devops.gov.bc.ca/api

          OPENSHIFT_NAMESPACE=${{ secrets.DEV_OPENSHIFT_NAMESPACE }}
          EOF

      - name: Log in to the GitHub Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Docker layers for SSO Requests Cron
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache-sso-requests-cron
          key: ${{ runner.os }}-buildx-sso-requests-cron-${{ github.sha }}
          restore-keys: ${{ runner.os }}-buildx-sso-requests-cron-

      - name: Cache Docker layers for SSO Requests API
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache-sso-requests-api
          key: ${{ runner.os }}-buildx-sso-requests-api-${{ github.sha }}
          restore-keys: ${{ runner.os }}-buildx-sso-requests-api-

      - name: Cache Docker layers for SSO Requests
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache-sso-requests
          key: ${{ runner.os }}-buildx-sso-requests-${{ github.sha }}
          restore-keys: ${{ runner.os }}-buildx-sso-requests-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push SSO Requests Docker image
        uses: docker/build-push-action@v7
        with:
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SSO_URL=${{ env.NEXT_PUBLIC_SSO_URL }}
            NEXT_PUBLIC_SSO_CLIENT_ID=${{ env.NEXT_PUBLIC_SSO_CLIENT_ID }}
            NEXT_PUBLIC_SSO_REDIRECT_URI=${{ env.NEXT_PUBLIC_SSO_REDIRECT_URI }}
            NEXT_PUBLIC_SSO_AUTHORIZATION_RESPONSE_TYPE=${{ env.NEXT_PUBLIC_SSO_AUTHORIZATION_RESPONSE_TYPE }}
            NEXT_PUBLIC_SSO_AUTHORIZATION_SCOPE=${{ env.NEXT_PUBLIC_SSO_AUTHORIZATION_SCOPE }}
            NEXT_PUBLIC_SSO_TOKEN_GRANT_TYPE=${{ env.NEXT_PUBLIC_SSO_TOKEN_GRANT_TYPE }}
            NEXT_PUBLIC_SSO_CONFIGURATION_ENDPOINT=${{ env.NEXT_PUBLIC_SSO_CONFIGURATION_ENDPOINT }}
            NEXT_PUBLIC_ENABLE_GOLD=${{ env.NEXT_PUBLIC_ENABLE_GOLD }}
            NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_INCLUDE_DIGITAL_CREDENTIAL=${{ env.NEXT_PUBLIC_INCLUDE_DIGITAL_CREDENTIAL }}
            NEXT_PUBLIC_INCLUDE_BC_SERVICES_CARD=${{ env.NEXT_PUBLIC_INCLUDE_BC_SERVICES_CARD }}
            NEXT_PUBLIC_ALLOW_BC_SERVICES_CARD_PROD=${{ env.NEXT_PUBLIC_ALLOW_BC_SERVICES_CARD_PROD }}
            NEXT_PUBLIC_INCLUDE_OTP=${{ env.NEXT_PUBLIC_INCLUDE_OTP }}
          context: .
          push: true
          tags: ${{ env.GITHUB_REGISTRY }}/bcgov/sso-requests:dev
          cache-from: type=local,src=/tmp/.buildx-cache-sso-requests
          cache-to: type=local,dest=/tmp/.buildx-cache-sso-requests-new,mode=max

        # Temp fix
        # https://github.com/docker/build-push-action/issues/252
        # https://github.com/moby/buildkit/issues/1896
      - name: Move cache
        run: rm -rf /tmp/.buildx-cache-sso-requests
          mv /tmp/.buildx-cache-sso-requests-new /tmp/.buildx-cache-sso-requests

      - name: Build and Push SSO Requests Cron Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./cron
          push: true
          tags: ${{ env.GITHUB_REGISTRY }}/bcgov/sso-requests-cron:dev
          cache-from: type=local,src=/tmp/.buildx-cache-sso-requests-cron
          cache-to: type=local,dest=/tmp/.buildx-cache-sso-requests-cron-new,mode=max

      - name: Move cache
        run: rm -rf /tmp/.buildx-cache-sso-requests-cron
          mv /tmp/.buildx-cache-sso-requests-cron-new /tmp/.buildx-cache-sso-requests-cron

      - name: Build and Push SSO Requests API Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./api
          push: true
          tags: ${{ env.GITHUB_REGISTRY }}/bcgov/sso-requests-api:dev
          cache-from: type=local,src=/tmp/.buildx-cache-sso-requests-api
          cache-to: type=local,dest=/tmp/.buildx-cache-sso-requests-api-new,mode=max

      - name: Move cache
        run: rm -rf /tmp/.buildx-cache-sso-requests-api
          mv /tmp/.buildx-cache-sso-requests-api-new /tmp/.buildx-cache-sso-requests-api
